<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Adindang Food</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar__brand">
        <div class="brand__logo" aria-hidden="true">
          <svg viewBox="0 0 48 48" width="36" height="36" role="img" aria-label="Adindang Food">
            <defs>
              <linearGradient id="afg" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0" stop-color="#c2410c" />
                <stop offset="1" stop-color="#0f766e" />
              </linearGradient>
            </defs>
            <circle cx="24" cy="24" r="22" fill="url(#afg)" />
            <circle cx="24" cy="24" r="18.5" fill="rgba(255,255,255,0.18)" />
            <path d="M13 30c3.5-7.5 18.5-7.5 22 0" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="2.6" stroke-linecap="round" />
            <text x="24" y="22.5" text-anchor="middle" font-size="12.5" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-weight="800" fill="#ffffff">AF</text>
          </svg>
        </div>
        <div class="brand__text">
          <div class="brand__title">Adindang Food</div>
          <div class="brand__subtitle" id="subtitle"></div>
        </div>
      </div>
      <nav class="topbar__nav" id="topnav"></nav>
    </header>

    <main class="container">
      <div id="app"></div>
    </main>

    <div class="toast" id="toast" aria-live="polite" aria-atomic="true"></div>

    <script>
      window.APP_CONFIG = {
        realtime: {
          provider: "firebase",
          enabled: true,
          firebaseConfig: {
            apiKey: "",
            authDomain: "",
            projectId: "",
            storageBucket: "",
            messagingSenderId: "",
            appId: "",
          },
        },
      };
    </script>
    <script src="./app.js" type="module"></script>
  </body>
</html>
