    <circle cx="150" cy="138" r="96" fill="rgba(245,158,11,0.35)"/>
    <circle cx="200" cy="150" r="74" fill="rgba(239,68,68,0.28)"/>
    <circle cx="330" cy="132" r="86" fill="rgba(34,197,94,0.22)"/>
    <g fill="rgba(255,255,255,0.88)" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial">
      <text x="248" y="322" font-size="30" font-weight="800" text-anchor="middle">Ayam Geprek</text>
